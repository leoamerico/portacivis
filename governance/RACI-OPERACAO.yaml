version: 1
updatedAt: 2026-03-04

roles:
  platform_owner:
    title: Platform Owner
    responsibilities:
      - approve_governance_changes
      - incident_escalation
  security_lead:
    title: Security Lead
    responsibilities:
      - security_headers_policy
      - vulnerability_response
  localization_lead:
    title: Localization Lead
    responsibilities:
      - translation_quality
      - terminology_glossary
  sre_oncall:
    title: SRE On-call
    responsibilities:
      - slo_monitoring
      - smoke_failure_response
  release_manager:
    title: Release Manager
    responsibilities:
      - deploy_approval
      - rollback_coordination

matrix:
  - process: change_governance_policy
    accountable: platform_owner
    responsible:
      - platform_owner
      - security_lead
    consulted:
      - localization_lead
    informed:
      - release_manager

  - process: update_translations
    accountable: localization_lead
    responsible:
      - localization_lead
    consulted:
      - platform_owner
    informed:
      - sre_oncall

  - process: smoke_failure_handling
    accountable: sre_oncall
    responsible:
      - sre_oncall
      - release_manager
    consulted:
      - security_lead
    informed:
      - platform_owner

  - process: emergency_rollback
    accountable: release_manager
    responsible:
      - release_manager
      - sre_oncall
    consulted:
      - platform_owner
    informed:
      - localization_lead
