version: 1
updatedAt: 2026-03-07

roles:
  platform_owner:
    title: Platform Owner
    responsibilities:
      - approve_governance_changes
      - incident_escalation
  security_lead:
    title: Security Lead
    responsibilities:
      - security_headers_policy
      - vulnerability_response
  localization_lead:
    title: Localization Lead
    responsibilities:
      - translation_quality
      - terminology_glossary
  sre_oncall:
    title: SRE On-call
    responsibilities:
      - slo_monitoring
      - smoke_failure_response
  release_manager:
    title: Release Manager
    responsibilities:
      - deploy_approval
      - rollback_coordination
  dpo:
    title: Data Protection Officer (Encarregado LGPD)
    contact: dpo@envneo.com.br
    responsibilities:
      - lgpd_data_inventory_maintenance
      - titular_rights_requests
      - data_incident_response
      - compliance_audit_coordination
      - team_privacy_training
      - anpd_communication

matrix:
  - process: change_governance_policy
    accountable: platform_owner
    responsible:
      - platform_owner
      - security_lead
    consulted:
      - localization_lead
    informed:
      - release_manager

  - process: update_translations
    accountable: localization_lead
    responsible:
      - localization_lead
    consulted:
      - platform_owner
    informed:
      - sre_oncall

  - process: smoke_failure_handling
    accountable: sre_oncall
    responsible:
      - sre_oncall
      - release_manager
    consulted:
      - security_lead
    informed:
      - platform_owner

  - process: emergency_rollback
    accountable: release_manager
    responsible:
      - release_manager
      - sre_oncall
    consulted:
      - platform_owner
    informed:
      - localization_lead

  - process: titular_rights_requests
    accountable: dpo
    responsible:
      - dpo
    consulted:
      - platform_owner
      - security_lead
    informed:
      - release_manager

  - process: data_incident_response
    accountable: dpo
    responsible:
      - dpo
      - security_lead
      - sre_oncall
    consulted:
      - platform_owner
    informed:
      - release_manager

  - process: lgpd_compliance_audit
    accountable: dpo
    responsible:
      - dpo
      - platform_owner
    consulted:
      - security_lead
    informed:
      - sre_oncall
      - release_manager

  - process: team_privacy_training
    accountable: dpo
    responsible:
      - dpo
    consulted:
      - platform_owner
    informed:
      - security_lead
      - localization_lead
      - sre_oncall
      - release_manager
