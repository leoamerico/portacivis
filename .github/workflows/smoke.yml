name: PortaCivis Smoke

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  smoke-check:
    name: Canonical Smoke Gate
    runs-on: ubuntu-latest

    env:
      CANONICAL_URL: https://www.portacivis.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Install dependencies
        run: bun install

      - name: Canonical smoke (blocking)
        run: bun run test:smoke

      - name: Open issue on scheduled failure
        if: ${{ always() && failure() && github.event_name == 'schedule' }}
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const marker = '[AUTO-SMOKE-FAILURE]';
            const workflowUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;

            const {data: issues} = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 50
            });

            const existing = issues.find(issue =>
              issue.title.includes('Falha no monitoramento diário de smoke') &&
              issue.body &&
              issue.body.includes(marker)
            );

            const body = [
              marker,
              '',
              'O workflow agendado `smoke.yml` falhou no domínio canônico.',
              '',
              `- Repositório: ${owner}/${repo}`,
              `- Run: ${workflowUrl}`,
              `- Horário UTC: ${new Date().toISOString()}`,
              '',
              'Ação sugerida:',
              '1. Verificar disponibilidade DNS/TLS do domínio canônico.',
              '2. Executar localmente `bun run test:smoke` e `bun run verify:all`.',
              '3. Se necessário, acionar rollback conforme `governance/SLO-RUNBOOK.yaml`.'
            ].join('\n');

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body: `Nova falha detectada em ${new Date().toISOString()}\\n\\nRun: ${workflowUrl}`
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title: 'Falha no monitoramento diário de smoke (domínio canônico)',
                body
              });
            }
