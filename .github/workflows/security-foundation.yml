name: PortaCivis Security Foundation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  security-foundation:
    name: Security Foundation Gates
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Security Verify (blocking)
        run: npm run security:verify

      - name: Smoke Check (blocking)
        env:
          CANONICAL_URL: https://portacivis.vercel.app
        run: npm run test:smoke
