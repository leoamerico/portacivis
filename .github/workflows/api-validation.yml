name: API Validation

on:
  push:
    branches: [main]
    paths:
      - 'docs/api/**'
      - 'public/dados-abertos/**'
      - 'public/docs/api/**'
      - 'app/api/v1/**'
      - 'governance/E-PING-COMPLIANCE.yaml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/api/**'
      - 'public/dados-abertos/**'
      - 'public/docs/api/**'
      - 'app/api/v1/**'
      - 'governance/E-PING-COMPLIANCE.yaml'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  validate-openapi:
    name: Validate OpenAPI Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Install dependencies
        run: bun install

      - name: Validate OpenAPI specification (YAML syntax)
        run: node -e "
          const fs = require('fs');
          const YAML = require('yaml');
          const content = fs.readFileSync('docs/api/openapi.yaml', 'utf8');
          const parsed = YAML.parse(content);
          if (!parsed.openapi || !parsed.info || !parsed.paths) {
            throw new Error('OpenAPI spec missing required fields: openapi, info, paths');
          }
          if (!parsed.openapi.startsWith('3.')) {
            throw new Error('OpenAPI version must be 3.x');
          }
          console.log('OpenAPI spec is valid: version', parsed.openapi, '— paths:', Object.keys(parsed.paths).length);
        "

      - name: Verify OpenAPI and public spec are in sync
        run: node -e "
          const fs = require('fs');
          const src = fs.readFileSync('docs/api/openapi.yaml', 'utf8');
          const pub = fs.readFileSync('public/docs/api/openapi.yaml', 'utf8');
          if (src !== pub) {
            throw new Error('docs/api/openapi.yaml and public/docs/api/openapi.yaml are out of sync. Run: cp docs/api/openapi.yaml public/docs/api/openapi.yaml');
          }
          console.log('OpenAPI specs are in sync.');
        "

  validate-open-data:
    name: Validate Open Data Catalog (INDA)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run open data quality gate
        run: node scripts/validate-opendata.mjs

  validate-epping-compliance:
    name: Validate e-PING Compliance YAML
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Install dependencies
        run: bun install

      - name: Validate e-PING compliance checklist
        run: node -e "
          const fs = require('fs');
          const YAML = require('yaml');
          const content = fs.readFileSync('governance/E-PING-COMPLIANCE.yaml', 'utf8');
          const parsed = YAML.parse(content);
          const nonCompliant = [];
          for (const [cat, data] of Object.entries(parsed.categories || {})) {
            for (const check of (data.checks || [])) {
              if (check.status !== 'compliant' && check.status !== 'not_applicable') {
                nonCompliant.push({ cat, id: check.id, status: check.status });
              }
            }
          }
          if (nonCompliant.length > 0) {
            console.error('Non-compliant checks:', JSON.stringify(nonCompliant, null, 2));
            throw new Error('e-PING compliance check failed: ' + nonCompliant.length + ' non-compliant item(s)');
          }
          console.log('e-PING compliance: OK — all checks are compliant.');
        "
