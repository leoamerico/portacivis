name: LGPD Compliance Validation

on:
  push:
    branches: [main]
    paths:
      - 'governance/LGPD-DATA-INVENTORY.yaml'
      - 'governance/RACI-OPERACAO.yaml'
      - 'governance/compliance-cases/RIPD-PORTACIVIS/**'
  pull_request:
    branches: [main]
    paths:
      - 'governance/LGPD-DATA-INVENTORY.yaml'
      - 'governance/RACI-OPERACAO.yaml'
      - 'governance/compliance-cases/RIPD-PORTACIVIS/**'
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lgpd-compliance:
    name: LGPD Compliance Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Install dependencies
        run: bun install

      - name: Verify LGPD inventory exists
        run: |
          if [ ! -f "governance/LGPD-DATA-INVENTORY.yaml" ]; then
            echo "ERROR: governance/LGPD-DATA-INVENTORY.yaml not found"
            exit 1
          fi
          echo "OK: LGPD data inventory found"

      - name: Verify RIPD exists
        run: |
          if [ ! -f "governance/compliance-cases/RIPD-PORTACIVIS/RIPD-PORTACIVIS.md" ]; then
            echo "ERROR: governance/compliance-cases/RIPD-PORTACIVIS/RIPD-PORTACIVIS.md not found"
            exit 1
          fi
          echo "OK: RIPD found"

      - name: Validate LGPD inventory YAML schema
        run: node scripts/verify-lgpd-inventory.mjs

      - name: Validate DPO presence in RACI
        run: |
          if ! grep -q "dpo:" governance/RACI-OPERACAO.yaml; then
            echo "ERROR: DPO role not found in governance/RACI-OPERACAO.yaml"
            exit 1
          fi
          if ! grep -q "dpo@envneo.com.br" governance/RACI-OPERACAO.yaml; then
            echo "ERROR: DPO contact email not found in governance/RACI-OPERACAO.yaml"
            exit 1
          fi
          echo "OK: DPO role and contact present in RACI"

      - name: Validate inventory freshness (max 90 days)
        run: |
          UPDATED_AT=$(grep "^updated_at:" governance/LGPD-DATA-INVENTORY.yaml | sed 's/updated_at: *"\?\([0-9-]*\)"\?/\1/')
          if [ -z "$UPDATED_AT" ]; then
            echo "ERROR: updated_at field not found or invalid in LGPD-DATA-INVENTORY.yaml"
            exit 1
          fi
          UPDATED_EPOCH=$(date -d "$UPDATED_AT" +%s 2>/dev/null || date -j -f "%Y-%m-%d" "$UPDATED_AT" +%s)
          NOW_EPOCH=$(date +%s)
          DIFF_DAYS=$(( (NOW_EPOCH - UPDATED_EPOCH) / 86400 ))
          echo "Inventory last updated: $UPDATED_AT ($DIFF_DAYS days ago)"
          if [ "$DIFF_DAYS" -gt 90 ]; then
            echo "ERROR: LGPD data inventory is stale ($DIFF_DAYS days old, max 90 days)"
            echo "Please update governance/LGPD-DATA-INVENTORY.yaml and set updated_at to today"
            exit 1
          fi
          echo "OK: Inventory is current ($DIFF_DAYS days old)"

      - name: Validate DPO contact in privacy page
        run: |
          if ! grep -rq "dpo@envneo.com.br" app/privacidade/; then
            echo "ERROR: DPO contact email not visible in app/privacidade/"
            exit 1
          fi
          echo "OK: DPO contact present in privacy page"

      - name: Operational governance check (includes RACI validation)
        run: bun run governance:verify

      - name: Summary
        run: |
          echo "=============================="
          echo "LGPD Compliance Gates: PASSED"
          echo "=============================="
          echo "  ✓ LGPD data inventory exists"
          echo "  ✓ RIPD exists"
          echo "  ✓ LGPD inventory YAML schema valid"
          echo "  ✓ DPO present in RACI"
          echo "  ✓ Inventory is current (≤ 90 days)"
          echo "  ✓ DPO contact in privacy page"
          echo "  ✓ Operational governance check passed"
