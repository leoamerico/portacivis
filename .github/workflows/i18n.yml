name: PortaCivis i18n

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  i18n-regression:
    name: i18n Regression Gate
    runs-on: ubuntu-latest

    env:
      BASE_URL: https://www.portacivis.com.br

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.3'

      - name: Install dependencies
        run: bun install

      - name: i18n smoke (blocking)
        run: bun run test:i18n
